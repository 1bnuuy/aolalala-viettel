services:
  chatbot-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CHATBOT_DB_NAME:-chatbot}
      POSTGRES_USER: ${CHATBOT_DB_USER:-chatbot}
      POSTGRES_PASSWORD: ${CHATBOT_DB_PASSWORD:?required}
    volumes:
      - chatbot-pg-data:/var/lib/postgresql/data
      - ./sql/chatbot:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHATBOT_DB_USER:-chatbot} -d ${CHATBOT_DB_NAME:-chatbot}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal

  import-data:
    build:
      context: .
      dockerfile: docker/production.Dockerfile
    command: npx tsx scripts/import-data.ts
    environment:
      CHATBOT_DATABASE_URL: postgres://${CHATBOT_DB_USER:-chatbot}:${CHATBOT_DB_PASSWORD}@chatbot-postgres:5432/${CHATBOT_DB_NAME:-chatbot}
    depends_on:
      chatbot-postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - setup

  hert-hospital-mcp:
    build:
      context: .
      dockerfile: docker/production.Dockerfile
    command: npx tsx packages/hert-hospital-mcp/src/server.ts
    restart: unless-stopped
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: 5000
      CHATBOT_DATABASE_URL: postgres://${CHATBOT_DB_USER:-chatbot}:${CHATBOT_DB_PASSWORD}@chatbot-postgres:5432/${CHATBOT_DB_NAME:-chatbot}
    depends_on:
      chatbot-postgres:
        condition: service_healthy
    networks:
      - internal

  chatbot-api:
    build:
      context: .
      dockerfile: docker/production.Dockerfile
    command: npx tsx apps/chatbot-api/src/server.ts
    restart: unless-stopped
    environment:
      CHATBOT_PORT: 3000
      CHATBOT_DATABASE_URL: postgres://${CHATBOT_DB_USER:-chatbot}:${CHATBOT_DB_PASSWORD}@chatbot-postgres:5432/${CHATBOT_DB_NAME:-chatbot}
      MCP_HTTP_URL: http://hert-hospital-mcp:5000
      DASHBOARD_API_URL: ${DASHBOARD_API_URL:?required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-~openai/gpt-latest}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-http://localhost:3000}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Hert Hospital Chatbot}
      AI_PROVIDER_LOG_ENABLED: ${AI_PROVIDER_LOG_ENABLED:-false}
      AI_PROVIDER_LOG_FILE: /app/logs/ai-provider.log
    volumes:
      - ai-logs:/app/logs
    depends_on:
      chatbot-postgres:
        condition: service_healthy
      hert-hospital-mcp:
        condition: service_started
    networks:
      - internal
      - web

volumes:
  chatbot-pg-data:
  ai-logs:

networks:
  internal:
    driver: bridge
  web:
    external: true
    name: coolify-proxy
